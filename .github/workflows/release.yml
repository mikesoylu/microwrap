name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and test (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            machine: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            machine: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build static release binaries
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          EXPECTED_MACHINE: ${{ matrix.machine }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          mkdir -p build dist

          output="/work/build/microwrap-linux-${ARCH}"
          docker run --rm \
            --platform "${PLATFORM}" \
            --volume "${GITHUB_WORKSPACE}:/work" \
            --workdir /work \
            --env "OUTPUT=${output}" \
            --env "EXPECTED_MACHINE=${EXPECTED_MACHINE}" \
            alpine:3.22 \
            sh -euc '
              apk add --no-cache build-base file linux-headers
              test "$(uname -m)" = "$EXPECTED_MACHINE"
              make release LDFLAGS=-static
              file microwrap | grep -q "statically linked"
              install -m 0755 microwrap "$OUTPUT"
            '

      - name: Test on Debian and Amazon Linux
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail

          wrap="/work/build/microwrap-linux-${ARCH}"
          for image in debian:bookworm-slim amazonlinux:2023; do
            docker run --rm --privileged \
              --platform "${PLATFORM}" \
              --volume "${GITHUB_WORKSPACE}:/work:ro" \
              --workdir /work \
              --env "WRAP=${wrap}" \
              "${image}" \
              /bin/sh -euc '
                if command -v dnf >/dev/null 2>&1; then
                  dnf install -y diffutils >/dev/null
                fi
                exec /work/test.sh
              '
          done

      - name: Package artifacts
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          version="sha-${GITHUB_SHA::12}"
          package="microwrap-${version}-linux-${ARCH}"
          mkdir -p "build/${package}"
          install -m 0755 "build/microwrap-linux-${ARCH}" \
            "build/${package}/microwrap"
          install -m 0644 README.md "build/${package}/README.md"
          tar -C build -czf "dist/${package}.tar.gz" "${package}"
          install -m 0755 "build/microwrap-linux-${ARCH}" "dist/${package}"

      - name: Upload tested artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: dist/microwrap-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish SHA release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download tested artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: (cd dist && sha256sum ./microwrap-* > SHA256SUMS)

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="sha-${GITHUB_SHA::12}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              dist/microwrap-* \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/microwrap-* \
              dist/SHA256SUMS \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              --title "microwrap ${RELEASE_TAG}"
          fi
